<head>
<meta charset="UTF-8">
<title>번개장터 유해 이미지 케이스 모음</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif; background: #f5f5f3; color: #1a1a1a; padding: 1.5rem 1rem; }
  .wrap { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .sub { font-size: 12px; color: #888; margin-bottom: 1.25rem; }
  .tabs { display: flex; gap: 4px; margin-bottom: 1rem; border-bottom: 1px solid #e0e0e0; }
  .tab { padding: 8px 18px; font-size: 13px; cursor: pointer; border-radius: 6px 6px 0 0; border: 1px solid transparent; border-bottom: none; color: #888; background: transparent; }
  .tab.active { background: #fff; border-color: #e0e0e0; color: #1a1a1a; font-weight: 500; margin-bottom: -1px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; }
  .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; overflow: hidden; }
  .card img { width: 100%; height: 170px; object-fit: contain; background: #f5f5f5; display: block; cursor: zoom-in; transition: opacity 0.15s; }
  .card img:hover { opacity: 0.85; }
  .card-body { padding: 9px 11px; display: flex; flex-direction: column; gap: 4px; }
  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; width: fit-content; }
  .badge-s { background: #FEE; color: #C00; }
  .badge-g { background: #FFF3DC; color: #854F0B; }
  .badge-n { background: #EFD; color: #2a6; }
  .card-title { font-size: 12px; font-weight: 500; color: #1a1a1a; line-height: 1.4; }
  .card-reason { font-size: 11px; color: #666; line-height: 1.5; }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; align-items: center; justify-content: center; }
  .modal.open { display: flex; }
  .modal-inner { position: relative; max-width: 90vw; max-height: 90vh; }
  .modal-inner img { max-width: 90vw; max-height: 85vh; object-fit: contain; border-radius: 8px; display: block; }
  .modal-close { position: absolute; top: -14px; right: -14px; width: 30px; height: 30px; border-radius: 50%; background: #fff; border: none; cursor: pointer; font-size: 15px; color: #333; display: flex; align-items: center; justify-content: center; }
  .modal-label { color: #fff; font-size: 13px; text-align: center; margin-top: 10px; }
  .section-label { font-size: 12px; font-weight: 600; color: #888; margin: 1rem 0 8px; letter-spacing: 0.05em; text-transform: uppercase; }
  .divider { border: none; border-top: 1px solid #eee; margin: 1rem 0; }
</style>
</head>

let allImgs = [];

function renderCard(c, i, arr, prefix) {
  const idx = arr.findIndex(x => x === c);
  const globalIdx = allImgs.findIndex(x => x === c);
  const bclass = c.verdict && c.verdict.includes('제재') ? 'badge-s' : c.verdict && c.verdict.includes('정상') ? 'badge-n' : 'badge-g';
  const blabel = c.verdict || '? 고민';
  const issue = c.issue ? `<div style="font-size:11px;color:#185FA5;font-weight:500;margin-top:2px">쟁점: ${c.issue}</div>` : '';
  return `<div class="card">
    <img src="data:image/jpeg;base64,${c.b64}" alt="${c.title}" onclick="openModal(${globalIdx})">
    <div class="card-body">
      <span class="badge ${bclass}">${blabel}</span>
      <div class="card-title">${c.title}</div>
      <div class="card-reason">${c.reason}</div>
      ${issue}
    </div>
  </div>`;
}

allImgs = [...GOMIN, ...COSTUME];

document.getElementById('gominGrid').innerHTML = GOMIN.map((c,i) => renderCard(c,i,GOMIN,'g')).join('');
document.getElementById('costumeS').innerHTML = COSTUME.filter(c=>c.verdict&&c.verdict.includes('제재')).map((c,i)=>renderCard(c,i,COSTUME,'cs')).join('');
document.getElementById('costumeG').innerHTML = COSTUME.filter(c=>c.verdict&&c.verdict.includes('고민')).map((c,i)=>renderCard(c,i,COSTUME,'cg')).join('');

function switchTab(id) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function openModal(i) {
  document.getElementById('modalImg').src = 'data:image/jpeg;base64,' + allImgs[i].b64;
  document.getElementById('modalLabel').textContent = allImgs[i].title + (allImgs[i].issue ? ' — ' + allImgs[i].issue : '');
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });
</script>
